# ===============================
# APPLICATION
# ===============================
spring.application.name=ShopEase
server.port=8080


# ===============================
# DATABASE CONFIGURATION (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/shopease_db
spring.datasource.username=amal
spring.datasource.password=amal
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.cache=false


# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always


# ===============================
# SPRING BOOT ADMIN (CLIENT MODE)
# ===============================
spring.boot.admin.client.enabled=true
spring.boot.admin.client.url=http://localhost:8080
spring.boot.admin.client.instance.name=ShopEase


# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO

# =========================
# EMAIL CONFIG (GMAIL)
# =========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.org.springframework.mail=DEBUG
logging.level.org.springframework.boot.autoconfigure.mail=DEBUG


