<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Order Details | ShopEase</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f8;
    padding: 20px;
}

h2, h3 {
    margin-bottom: 10px;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 6px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

th {
    background-color: #2c3e50;
    color: white;
}

img {
    width: 70px;
    border-radius: 4px;
}

.status {
    font-weight: bold;
}

.PENDING { color: orange; }
.PLACED { color: blue; }
.DELIVERED { color: green; }
.CANCELLED { color: red; }

.back {
    margin-top: 15px;
    display: inline-block;
    text-decoration: none;
    color: #2c3e50;
    font-weight: bold;
}

.cancel-btn {
    background-color: #e74c3c;
    color: white;
    border: none;
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 4px;
    margin-top: 10px;
}

.success {
    background: #eafaf1;
    color: #27ae60;
    padding: 10px;
    border-radius: 4px;
    margin-bottom: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>📦 Order Details</h2>

<!-- SUCCESS MESSAGE -->
<div th:if="${message}" class="success" th:text="${message}"></div>

<!-- ORDER SUMMARY -->
<div class="card">
    <p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>

    <p>
        <strong>Date:</strong>
        <span th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy HH:mm')}"></span>
    </p>

    <p>
        <strong>Status:</strong>
        <span class="status"
              th:text="${order.status}"
              th:classappend="${order.status}">
        </span>
    </p>

    <p>
        <strong>Total Amount:</strong>
        ₹<span th:text="${order.totalAmount}"></span>
    </p>

    <!-- CANCEL BUTTON (ONLY IF ALLOWED) -->
    <form th:if="${order.status == 'PENDING' or order.status == 'PLACED'}"
          th:action="@{/orders/cancel}"
          method="post">

        <input type="hidden" name="orderId" th:value="${order.id}"/>

        <button type="submit" class="cancel-btn"
                onclick="return confirm('Are you sure you want to cancel this order?')">
            Cancel Order
        </button>
    </form>
</div>

<!-- ORDER ITEMS -->
<h3>🛍 Items</h3>

<table>
    <tr>
        <th>Product</th>
        <th>Image</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Total</th>
    </tr>

    <tr th:each="item : ${items}">
        <td th:text="${item.product.name}"></td>

        <td>
            <img th:src="@{/uploads/{img}(img=${item.product.imageName})}">
        </td>

        <td>₹<span th:text="${item.product.price}"></span></td>

        <td th:text="${item.quantity}"></td>

        <td>₹<span th:text="${item.totalPrice}"></span></td>
    </tr>
</table>

<a class="back" th:href="@{/orders}">
    ← Back to My Orders
</a>

</body>
</html>
