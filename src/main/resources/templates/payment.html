<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Payment | ShopEase</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f8;
    padding: 40px;
}
.card {
    background: white;
    padding: 25px;
    max-width: 420px;
    margin: auto;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.product {
    text-align: center;
}
.product img {
    width: 120px;
}
.amount {
    font-size: 22px;
    text-align: center;
    margin: 15px 0;
    font-weight: bold;
}
label {
    display: block;
    margin-top: 12px;
    font-weight: bold;
}
input, textarea, select {
    width: 100%;
    padding: 8px;
    margin-top: 6px;
}
button {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    border: none;
    cursor: pointer;
    font-size: 16px;
}
.pay { background: #27ae60; color: white; }
.cancel { background: #e74c3c; color: white; }
</style>
</head>

<body>

<!-- ================= PAYMENT CARD ================= -->
<div class="card" th:if="${product != null}">

    <h2 style="text-align:center;">💳 Payment</h2>

    <!-- PRODUCT SUMMARY -->
    <div class="product">
        <img th:src="@{/uploads/{img}(img=${product.imageName})}" alt="Product Image">
        <p><strong th:text="${product.name}"></strong></p>
        <p>Price: ₹ <span th:text="${product.price}"></span></p>
        <p>Quantity: <span th:text="${quantity}"></span></p>
    </div>

    <div class="amount">
        Total: ₹ <span th:text="${total}"></span>
    </div>

    <!-- PAYMENT FORM -->
    <form th:action="@{/payment/success}" method="post">

        <!-- CSRF -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <!-- BACKEND REQUIRED DATA -->
        <input type="hidden" name="productId" th:value="${product.id}" />
        <input type="hidden" name="quantity" th:value="${quantity}" />

        <label>Full Name</label>
        <input type="text" name="customerName" required />

        <label>Phone</label>
        <input type="tel" name="phone" required />

        <label>Address</label>
        <textarea name="address" rows="3" required></textarea>

        <label>Payment Method</label>
        <select name="paymentMethod" required>
            <option value="COD">Cash on Delivery</option>
            <option value="UPI">UPI</option>
            <option value="CARD">Card</option>
        </select>

        <button class="pay" type="submit">Confirm & Pay</button>
    </form>

    <!-- CANCEL -->
    <form th:action="@{/payment/cancel}" method="post">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />
        <button class="cancel" type="submit">Cancel</button>
    </form>

</div>

<!-- ================= FALLBACK ================= -->
<div class="card" th:if="${product == null}">
    <h2 style="text-align:center;">⚠️ Invalid Payment Request</h2>
    <p style="text-align:center;">
        Please select a product before proceeding.
    </p>
    <a th:href="@{/}" style="display:block;text-align:center;margin-top:15px;">
        Go Home
    </a>
</div>

</body>
</html>
