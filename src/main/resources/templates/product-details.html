<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<meta charset="UTF-8">
<title th:text="${product.name}">Product</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f8;
    padding: 30px;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 8px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
}

img {
    width: 100%;
    height: 350px;
    object-fit: cover;
    border-radius: 6px;
}

.price {
    font-size: 22px;
    color: #27ae60;
    margin: 10px 0;
}

.qty {
    margin-bottom: 15px;
}

.admin-actions a {
    margin-right: 10px;
}

button {
    padding: 10px 16px;
    border: none;
    cursor: pointer;
}

.edit-btn {
    background: #2980b9;
    color: white;
}

.delete-btn {
    background: #c0392b;
    color: white;
}

.back {
    margin-top: 20px;
    display: inline-block;
}
</style>
</head>

<body>

<div class="container">

    <!-- IMAGE -->
    <div>
        <img th:src="@{/uploads/{img}(img=${product.imageName})}"
             alt="Product Image">
    </div>

    <!-- DETAILS -->
    <div>
        <h2 th:text="${product.name}">Product Name</h2>

        <p class="price">
            ₹ <span th:text="${product.price}"></span>
        </p>

        <p class="qty">
            Available Quantity:
            <b th:text="${product.quantity}"></b>
        </p>

        <p th:text="${product.description}"></p>

        <!-- ADMIN ONLY ACTIONS -->
        <div class="admin-actions"
             sec:authorize="hasAuthority('ROLE_ADMIN')">

            <a th:href="@{/admin/edit-product(id=${product.id})}">
                <button class="edit-btn">Edit</button>
            </a>

            <a th:href="@{/admin/delete-product(id=${product.id})}"
               onclick="return confirm('Delete this product?')">
                <button class="delete-btn">Delete</button>
            </a>
        </div>

        <a th:href="@{/}" class="back">← Back to products</a>
    </div>

</div>

</body>
</html>
