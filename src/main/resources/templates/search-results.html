<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<meta charset="UTF-8">
<title>Search Results | ShopEase</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f8;
    padding: 20px;
}

h2 {
    margin-bottom: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    text-align: center;
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 4px;
}

.actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
    align-items: center;
}

.qty {
    width: 60px;
    padding: 4px;
    text-align: center;
}

button {
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.buy-btn {
    background-color: #27ae60;
    color: white;
}

.cart-btn {
    background-color: #2c3e50;
    color: white;
}

.back {
    display: inline-block;
    margin-bottom: 20px;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- BACK -->
<a class="back" th:href="@{/}">← Back to Home</a>

<h2>
    Search results for "<span th:text="${keyword}"></span>"
</h2>

<!-- NO RESULTS -->
<div th:if="${#lists.isEmpty(products)}">
    <p>No products found.</p>
</div>

<!-- RESULTS -->
<div class="grid">

    <div class="card" th:each="product : ${products}">

        <!-- IMAGE (CLICKABLE) -->
        <a th:href="@{/product/{id}(id=${product.id})}">
            <img th:src="@{/uploads/{img}(img=${product.imageName})}"
                 alt="Product Image">
        </a>

        <!-- NAME (CLICKABLE) -->
        <h3>
            <a th:href="@{/product/{id}(id=${product.id})}"
               th:text="${product.name}"
               style="text-decoration:none; color:#2c3e50;">
            </a>
        </h3>

        <!-- PRICE -->
        <p>₹ <span th:text="${product.price}"></span></p>

        <!-- STOCK -->
        <p>Available: <span th:text="${product.quantity}"></span></p>

        <!-- USER ACTIONS -->
        <div class="actions" sec:authorize="hasAuthority('ROLE_USER')">

            <!-- QUANTITY -->
            <input class="qty"
                   type="number"
                   name="qty"
                   min="1"
                   th:max="${product.quantity}"
                   value="1">

            <!-- BUY NOW -->
            <form th:action="@{/buy-now/{id}(id=${product.id})}" method="get">
                <input type="hidden" name="qty" value="1">
                <button class="buy-btn" type="submit">Buy Now</button>
            </form>

            <!-- ADD TO CART -->
            <form th:action="@{/cart/add/{id}(id=${product.id})}" method="get">
                <input type="hidden" name="qty" value="1">
                <button class="cart-btn" type="submit">Add to Cart</button>
            </form>

        </div>

    </div>
</div>

</body>
</html>
