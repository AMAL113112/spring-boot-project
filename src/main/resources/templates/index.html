<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<meta charset="UTF-8">
<title>ShopEase | Products</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f8;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 6px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    text-align: center;
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 4px;
}

.actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
}

button {
    padding: 6px 10px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
}

.cart-btn {
    background-color: #2c3e50;
    color: white;
}

.buy-btn {
    background-color: #27ae60;
    color: white;
}

.admin-btn {
    padding: 8px 12px;
    background-color: #2c3e50;
    color: white;
    border: none;
}

.qty {
    width: 60px;
    padding: 4px;
}

a {
    text-decoration: none;
    color: inherit;
}
</style>
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="header">

    <div class="header-left">
        <h2>ShopEase</h2>

        <!-- SEARCH -->
        <form th:action="@{/search}" method="get">
            <input type="text" name="keyword" placeholder="Search products..." required>
            <button type="submit">Search</button>
        </form>

        <!-- ADMIN BUTTON -->
        <div sec:authorize="hasAuthority('ROLE_ADMIN')">
            <a th:href="@{/admin/add-product}">
                <button class="admin-btn">Add Product</button>
            </a>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div>

        <!-- USER NAV -->
        <div sec:authorize="hasAuthority('ROLE_USER')">
            <a th:href="@{/orders}">📦 My Orders</a> |
            <a th:href="@{/cart}">🛒 Cart</a>

            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit">Logout</button>
            </form>
        </div>

        <!-- ADMIN NAV -->
        <div sec:authorize="hasAuthority('ROLE_ADMIN')">
            <a th:href="@{/admin/orders}">📦 Admin Orders</a> |
            <a th:href="@{/admin/products}">🛠 Products</a>

            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit">Logout</button>
            </form>
        </div>

        <!-- GUEST -->
        <div sec:authorize="isAnonymous()">
            <a th:href="@{/login}">Login</a>
        </div>

    </div>
</div>

<!-- ================= PRODUCT GRID ================= -->
<div class="grid">

    <div class="card" th:each="product : ${products}">

        <!-- IMAGE -->
        <a th:href="@{/product/{id}(id=${product.id})}">
            <img th:src="@{/uploads/{img}(img=${product.imageName})}">
        </a>

        <!-- NAME -->
        <h3 th:text="${product.name}"></h3>

        <!-- PRICE -->
        <p>₹ <span th:text="${product.price}"></span></p>

        <!-- STOCK -->
        <p>Available: <span th:text="${product.quantity}"></span></p>

        <!-- USER ACTIONS -->
        <div class="actions" sec:authorize="hasAuthority('ROLE_USER')">

            <!-- ✅ FIXED BUY NOW -->
            <form th:action="@{/payment}" method="get">
                <input type="hidden" name="productId" th:value="${product.id}">
                <input class="qty" type="number" name="quantity" min="1"
                       th:max="${product.quantity}" value="1">
                <button class="buy-btn" type="submit">Buy Now</button>
            </form>

            <!-- ADD TO CART -->
            <form th:action="@{/cart/add/{id}(id=${product.id})}" method="get">
                <input type="hidden" name="qty" value="1">
                <button class="cart-btn" type="submit">Add to Cart</button>
            </form>

        </div>

    </div>
</div>

</body>
</html>
