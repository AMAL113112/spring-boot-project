<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Signup | ShopEase</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }
        .container {
            width: 350px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 6px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
        }
        a {
            display: block;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Signup</h2>

    <form th:action="@{/signup}" th:object="${user}" method="post">

        <!-- ✅ CSRF TOKEN (REQUIRED) -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <input type="text"
               th:field="*{username}"
               placeholder="Username"
               required>

        <input type="email"
               th:field="*{email}"
               placeholder="Email"
               required>

        <input type="password"
               th:field="*{password}"
               placeholder="Password"
               required>

        <button type="submit">Register</button>
    </form>

    <a th:href="@{/login}">Already have an account? Login</a>
</div>

</body>
</html>
