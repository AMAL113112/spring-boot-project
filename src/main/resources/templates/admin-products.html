<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>Admin Products | ShopEase</title>

<style>
body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background-color: #f4f6f8;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #2c3e50;
}

.top-bar {
    text-align: right;
    margin-bottom: 15px;
}

.top-bar a {
    padding: 10px 14px;
    background-color: #2c3e50;
    color: white;
    text-decoration: none;
    border-radius: 4px;
    font-size: 14px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
    text-align: center;
    font-size: 14px;
}

th {
    background-color: #2c3e50;
    color: white;
}

img {
    border-radius: 4px;
}

.action-btn {
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 13px;
    color: white;
    border: none;
    cursor: pointer;
}

.edit-btn {
    background-color: #3498db;
}

.delete-btn {
    background-color: #e74c3c;
}

form {
    display: inline;
}
</style>
</head>
<body>

<h2>Admin – Product Management</h2>

<div class="top-bar">
    <a th:href="@{/admin/add-product}">+ Add Product</a>
</div>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Image</th>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>

            <td>
                <img th:src="@{/uploads/{img}(img=${product.imageName})}"
                     width="100" alt="Product Image">
            </td>

            <td th:text="${product.name}"></td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.quantity}"></td>

            <td>
                <!-- EDIT -->
                <a th:href="@{/admin/edit-product(id=${product.id})}">
                    <button class="action-btn edit-btn">Edit</button>
                </a>

                <!-- DELETE (POST + CSRF) -->
                <form th:action="@{/admin/delete-product}"
                      method="post"
                      onsubmit="return confirm('Delete this product?');">

                    <!-- CSRF TOKEN -->
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />

                    <!-- PRODUCT ID -->
                    <input type="hidden"
                           name="id"
                           th:value="${product.id}" />

                    <button type="submit"
                            class="action-btn delete-btn">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>
