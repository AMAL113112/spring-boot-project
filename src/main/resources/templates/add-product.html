<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Product | ShopEase</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2c3e50, #3498db);
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    width: 400px;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

label {
    display: block;
    margin-top: 12px;
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
}

button {
    width: 100%;
    margin-top: 20px;
    padding: 10px;
    background-color: #2c3e50;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>Add Product</h2>

    <form th:action="@{/admin/save-product}"
          th:object="${product}"
          method="post"
          enctype="multipart/form-data">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <label>Name</label>
        <input type="text" th:field="*{name}" required>

        <label>Price</label>
        <input type="number" th:field="*{price}" required>

        <label>Quantity</label>
        <input type="number" th:field="*{quantity}" required>

        <label>Description</label>
        <textarea th:field="*{description}"></textarea>

        <label>Image</label>
        <input type="file" name="image" required>

        <button type="submit">Save Product</button>
    </form>
</div>

</body>
</html>
