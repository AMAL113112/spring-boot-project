<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>LOGIN</title>

<style>
body {
	margin: 0;
	padding: 0;
	height: 100vh;
	font-family: Arial, sans-serif;
	background: linear-gradient(135deg, #2c3e50, #3498db);
	display: flex;
	justify-content: center;
	align-items: center;
}

.login-box {
	background: #ffffff;
	padding: 30px;
	width: 350px;
	border-radius: 8px;
	box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
	text-align: center;
}

.login-box h2 {
	margin-bottom: 20px;
	color: #2c3e50;
}

.login-box input {
	width: 100%;
	padding: 10px;
	margin: 10px 0;
	border-radius: 4px;
	border: 1px solid #ccc;
	font-size: 14px;
}

.login-box button {
	width: 100%;
	padding: 10px;
	background-color: #2c3e50;
	color: white;
	border: none;
	border-radius: 4px;
	cursor: pointer;
	font-size: 15px;
	margin-top: 10px;
}

.login-box button:hover {
	background-color: #1a252f;
}

.message {
	margin-bottom: 10px;
	font-size: 14px;
}

.error {
	color: red;
}

.success {
	color: green;
}

.back-link {
	margin-top: 15px;
	display: block;
	font-size: 14px;
	text-decoration: none;
	color: #3498db;
}

.back-link:hover {
	text-decoration: underline;
}
</style>
</head>
<body>

	<div class="login-box">

		<h2>Login</h2>

		<!-- ❌ Login error -->
		<div th:if="${param.error}" class="message error">Invalid
			username or password</div>

		<!-- ✅ Logout message -->
		<div th:if="${param.logout}" class="message success">Logged out
			successfully</div>

		<form th:action="@{/login}" method="post">

			<!-- CSRF token -->
			<input type="hidden" th:name="${_csrf.parameterName}"
				th:value="${_csrf.token}" /> <input type="text" name="username"
				placeholder="Username" required> <input type="password"
				name="password" placeholder="Password" required>

			<button type="submit">Login</button>
		</form>
		<div style="margin-top: 15px;">
			<a th:href="@{/signup}">Don’t have an account? Sign up</a>
		</div>

		<!-- forgot password -->
		<a th:href="@{/forgot-password}"
			style="display: block; margin-top: 10px;"> Forgot password? </a> <a
			th:href="@{/}" class="back-link">← Back to Home</a>

	</div>

</body>
</html>
